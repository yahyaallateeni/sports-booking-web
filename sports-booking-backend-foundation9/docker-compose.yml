version: '3.9'
services:
  postgres:
    image: postgres:16
    container_name: sports-booking-postgres
    environment:
      POSTGRES_DB: sports_booking
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - sports_booking_pgdata:/var/lib/postgresql/data

volumes:
  sports_booking_pgdata:
